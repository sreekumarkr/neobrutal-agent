<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>AI Academy — OG</title>
<style>
  :root {
    --bg: #fef6e4;
    --ink: #0a0a0a;
    --pink: #ff6b9d;
    --yellow: #ffe45e;
    --green: #a3e635;
    --blue: #7dd3fc;
  }
  html, body {
    margin: 0; padding: 0;
    width: 1200px; height: 630px;
    background: var(--bg);
    font-family: 'Helvetica Neue', Arial, sans-serif;
    color: var(--ink);
    overflow: hidden;
    background-image:
      linear-gradient(rgba(10,10,10,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(10,10,10,0.05) 1px, transparent 1px);
    background-size: 30px 30px;
  }
  .card {
    position: absolute;
    inset: 32px;
    background: var(--pink);
    border: 8px solid var(--ink);
    box-shadow: 14px 14px 0 var(--ink);
    padding: 40px 56px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .logo {
    display: inline-block;
    background: var(--yellow);
    border: 5px solid var(--ink);
    padding: 8px 18px;
    font-weight: 900;
    font-size: 24px;
    transform: rotate(-1deg);
    box-shadow: 5px 5px 0 var(--ink);
    align-self: flex-start;
    letter-spacing: -0.5px;
  }
  h1 {
    font-size: 96px;
    font-weight: 900;
    line-height: 0.92;
    letter-spacing: -3px;
    text-transform: uppercase;
    margin: 18px 0 0 0;
  }
  h1 .pop {
    background: var(--yellow);
    padding: 0 14px;
    border: 5px solid var(--ink);
    display: inline-block;
    transform: rotate(-2deg);
    box-shadow: 6px 6px 0 var(--ink);
  }
  h1 .pop.alt {
    background: var(--green);
    transform: rotate(2deg);
  }
  .sub {
    font-size: 24px;
    font-weight: 700;
    max-width: 880px;
    margin-top: 22px;
    line-height: 1.35;
  }
  .tags {
    display: flex;
    gap: 12px;
    margin-top: 0;
  }
  .tag {
    background: #fff;
    border: 4px solid var(--ink);
    padding: 8px 16px;
    font-weight: 900;
    font-size: 18px;
    text-transform: uppercase;
    box-shadow: 4px 4px 0 var(--ink);
  }
  .tag.b { background: var(--blue); }
  .tag.y { background: var(--yellow); }
  .tag.g { background: var(--green); }
  .doodle {
    position: absolute;
    font-weight: 900;
    font-size: 180px;
    opacity: 0.12;
    pointer-events: none;
  }
  .d1 { top: 40px; right: 80px; }
  .d2 { bottom: -20px; right: 200px; font-size: 120px; }
</style>
</head>
<body>
  <div class="card">
    <div class="doodle d1">{ AI }</div>
    <div class="doodle d2">◢◤</div>

    <div>
      <span class="logo">AI / ACADEMY</span>
      <h1>Learn <span class="pop">AI</span><br/>The <span class="pop alt">Loud</span> Way.</h1>
      <p class="sub">Foundations, LLMs, Agents & Frameworks — a no-fluff, neobrutalist guide to modern AI.</p>
    </div>

    <div class="tags">
      <span class="tag b">Foundations</span>
      <span class="tag y">LLMs</span>
      <span class="tag g">Agents</span>
      <span class="tag">Frameworks</span>
    </div>
  </div>
</body>
</html>
